<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tara Eval — Verifier Quality Check</title>
<style>
  :root{
    --bg:#0e1117; --panel:#161b24; --panel2:#1c2330; --line:#2a3342;
    --text:#e6edf3; --muted:#8b97a8; --accent:#6ea8fe; --accent2:#7c5cff;
    --ok:#3fb950; --warn:#d29922; --bad:#f85149; --chip:#222b3a;
    --radius:14px; --shadow:0 8px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
       background:radial-gradient(1200px 600px at 80% -10%,#1a2440 0%,var(--bg) 55%);
       color:var(--text);min-height:100vh;line-height:1.5}
  header{padding:26px 32px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));
        display:grid;place-items:center;font-weight:800;color:#fff;box-shadow:var(--shadow)}
  header h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 24px 80px}
  .grid{display:grid;grid-template-columns:1fr;gap:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
  label{display:block;font-weight:600;font-size:13px;margin-bottom:8px;color:var(--text)}
  .hint{color:var(--muted);font-weight:400;font-size:12px}
  textarea,select,input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);
       color:var(--text);border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;transition:.15s}
  textarea:focus,select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(110,168,254,.15)}
  textarea{min-height:170px;resize:vertical;line-height:1.55}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.row{grid-template-columns:1fr}}
  .field{margin-bottom:18px}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:22px;text-align:center;cursor:pointer;
        background:var(--panel2);transition:.15s}
  .drop:hover,.drop.drag{border-color:var(--accent);background:#1a2333}
  .drop .big{font-size:14px;font-weight:600}
  .drop .small{color:var(--muted);font-size:12px;margin-top:4px}
  .drop.has{border-style:solid;border-color:var(--ok)}
  .filechip{display:inline-flex;align-items:center;gap:8px;background:var(--chip);border:1px solid var(--line);
        border-radius:999px;padding:6px 12px;font-size:12.5px;margin-top:10px}
  .btn{appearance:none;border:none;border-radius:11px;padding:13px 22px;font-size:14.5px;font-weight:700;cursor:pointer;
       background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:.15s;box-shadow:var(--shadow)}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.5;cursor:not-allowed;filter:none}
  .btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--text);box-shadow:none;padding:9px 14px;font-size:13px}
  .toolbar{display:flex;align-items:center;gap:12px;margin-top:6px}
  .link{color:var(--accent);cursor:pointer;font-size:12.5px;font-weight:600;background:none;border:none}
  /* progress */
  .progwrap{height:8px;background:var(--panel2);border-radius:999px;overflow:hidden;margin:14px 0 8px}
  .prog{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
  .statusline{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:13px}
  .spinner{width:15px;height:15px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* summary chips */
  .chips{display:flex;flex-wrap:wrap;gap:10px;margin:4px 0 18px}
  .chip{background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:600}
  .chip b{font-weight:800}
  .chip.ok{color:var(--ok)} .chip.bad{color:var(--bad)} .chip.warn{color:var(--warn)}
  /* result cards */
  h2.sec{font-size:14px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:26px 0 12px}
  .item{border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;background:var(--panel2)}
  .item .head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer}
  .badge{font-size:11px;font-weight:800;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
  .b-ok{background:rgba(63,185,80,.15);color:var(--ok)}
  .b-bad{background:rgba(248,81,73,.15);color:var(--bad)}
  .b-warn{background:rgba(210,153,34,.15);color:var(--warn)}
  .b-mut{background:var(--chip);color:var(--muted)}
  .item .name{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;font-weight:600;flex:1;
        white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .meta{color:var(--muted);font-size:12px}
  .item .body{padding:0 16px 16px;display:none;border-top:1px solid var(--line)}
  .item.open .body{display:block}
  .item .caret{color:var(--muted);transition:.15s}
  .item.open .caret{transform:rotate(90deg)}
  .qi{border-left:3px solid var(--bad);background:#1f1518;border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13px}
  .qi.minor{border-left-color:var(--warn);background:#1f1c12}
  .qi .qh{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
  .kv{margin:12px 0 0;font-size:13.5px}
  .kv .k{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:12px}
  .kv pre{white-space:pre-wrap;word-break:break-word;background:var(--bg);border:1px solid var(--line);
        border-radius:8px;padding:12px;font-size:12.5px;margin:6px 0 0;font-family:ui-monospace,Menlo,monospace}
  .missing{border-left:3px solid var(--warn);background:#1f1c12;border-radius:8px;padding:10px 12px;margin:8px 0;font-size:13px}
  .missing.crit{border-left-color:var(--bad);background:#1f1518}
  .empty{color:var(--muted);font-size:13px;padding:6px 0}
  .err{background:#1f1518;border:1px solid var(--bad);border-radius:10px;padding:14px;color:#ffb4ae;font-size:13px;white-space:pre-wrap}
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
</style>
</head>
<body>
<header>
  <div class="logo">τ</div>
  <div>
    <h1>Tara Eval</h1>
    <div class="sub">Self-serve verifier quality check — paste a prompt, pick a universe, upload your tests.</div>
  </div>
</header>

<div class="wrap">
  <div class="grid">
    <!-- INPUT -->
    <div class="card" id="inputCard">
      <div class="field">
        <label>Your full prompt <span class="hint">— the exact task instruction the model receives</span></label>
        <textarea id="prompt" placeholder="Paste the full prompt here…"></textarea>
      </div>

      <div class="field">
        <label>Rubrics <span class="hint">— one criterion per line, or paste a JSON rubric dict. Enables per-rubric audits + quoted &amp; intersection checks.</span></label>
        <textarea id="rubrics" placeholder="One criterion per line, e.g.&#10;The reply states the current monthly rent as $1,450.&#10;A cleaned-up script is saved to the workspace root.&#10;&#10;…or paste JSON: {&quot;R1&quot;: {&quot;criterion&quot;: &quot;…&quot;, &quot;importance&quot;: &quot;critically_important&quot;}}" style="min-height:120px"></textarea>
      </div>

      <div class="row">
        <div class="field">
          <label>Universe</label>
          <select id="universe"></select>
          <div class="toolbar">
            <button class="link" id="refreshU">↻ refresh</button>
            <button class="link" id="toggleUrl">use an env-zip URL instead</button>
          </div>
        </div>
        <div class="field" id="urlField" style="display:none">
          <label>Env zip URL <span class="hint">(scale-cds:// or https://)</span></label>
          <input type="text" id="envUrl" placeholder="scale-cds://… or https://…"/>
        </div>
        <div class="field">
          <label>Test file <span class="hint">— your pytest <code>test_outputs.py</code> (optional if rubrics given)</span></label>
          <div class="drop" id="drop">
            <div class="big">Drop your .py file here</div>
            <div class="small">or click to browse</div>
            <input type="file" id="file" accept=".py" hidden/>
          </div>
          <div id="fileInfo"></div>
        </div>
      </div>

      <div class="toolbar" style="margin-top:8px">
        <button class="btn" id="run">Run evaluation</button>
        <span class="hint" id="hintMsg">Audits each rubric &amp; test, plus coverage, redundancy, GTFA — and quoted &amp; intersection checks when rubrics are given.</span>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="card" id="progCard" style="display:none">
      <div class="statusline"><span class="spinner" id="spin"></span><span id="statusMsg">Starting…</span></div>
      <div class="progwrap"><div class="prog" id="prog"></div></div>
      <div class="hint" id="progCount"></div>
    </div>

    <!-- RESULTS -->
    <div id="results"></div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let fileText = null, fileName = null, pollTimer = null;

async function loadUniverses(){
  const sel = $('#universe');
  sel.innerHTML = '<option>loading…</option>';
  try{
    const r = await fetch('/api/universes'); const d = await r.json();
    if(!d.universes.length){ sel.innerHTML = `<option value="">No universes found in ${d.universe_dir}</option>`; return; }
    sel.innerHTML = d.universes.map(u=>`<option value="${u.value}">${u.label}</option>`).join('');
  }catch(e){ sel.innerHTML = '<option value="">failed to load</option>'; }
}
loadUniverses();
$('#refreshU').onclick = loadUniverses;
$('#toggleUrl').onclick = () => {
  const f = $('#urlField'); const show = f.style.display==='none';
  f.style.display = show?'block':'none';
  $('#toggleUrl').textContent = show?'use a listed universe instead':'use an env-zip URL instead';
};

// file upload
const drop = $('#drop'), fileInput = $('#file');
drop.onclick = () => fileInput.click();
fileInput.onchange = e => { if(e.target.files[0]) readFile(e.target.files[0]); };
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
drop.addEventListener('drop', e => { const f=e.dataTransfer.files[0]; if(f) readFile(f); });
function readFile(f){
  fileName=f.name;
  const rd=new FileReader();
  rd.onload=()=>{ fileText=rd.result;
    const n=(fileText.match(/def\s+test_[A-Za-z0-9_]+\s*\(/g)||[]).length;
    drop.classList.add('has');
    $('#fileInfo').innerHTML=`<span class="filechip">📄 ${f.name} · <b>${n}</b> test${n===1?'':'s'} detected</span>`;
  };
  rd.readAsText(f);
}

$('#run').onclick = async () => {
  const prompt=$('#prompt').value.trim();
  const universe=$('#universe').value;
  const envUrl=$('#envUrl').value.trim();
  const rubrics=$('#rubrics').value.trim();
  if(!prompt) return flash('Please paste your prompt.');
  if(!universe && !envUrl) return flash('Pick a universe (or provide an env URL).');
  if(!fileText && !rubrics) return flash('Provide a test file, rubrics, or both.');

  const fd=new FormData();
  fd.append('prompt',prompt);
  fd.append('universe', envUrl?'':universe);
  fd.append('env_url', envUrl);
  fd.append('rubrics', rubrics);
  if(fileText) fd.append('test_file', new Blob([fileText],{type:'text/x-python'}), fileName||'test_outputs.py');

  $('#run').disabled=true; $('#results').innerHTML=''; $('#progCard').style.display='block';
  $('#spin').style.display='inline-block';
  $('#statusMsg').textContent='Submitting…'; $('#prog').style.width='4%';
  try{
    const r=await fetch('/api/eval',{method:'POST',body:fd});
    if(!r.ok){ const e=await r.json(); throw new Error(e.detail||'request failed'); }
    const {job_id}=await r.json();
    poll(job_id);
  }catch(e){ $('#run').disabled=false; showError(e.message); }
};

function flash(msg){ const h=$('#hintMsg'); h.textContent=msg; h.style.color='var(--bad)'; setTimeout(()=>{h.style.color='';h.textContent='Runs per-test audits + coverage, redundancy & single-GTFA checks.';},3000); }

function poll(jobId){
  clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    const r=await fetch('/api/job/'+jobId); const j=await r.json();
    $('#statusMsg').textContent=j.message||j.status;
    const pct = j.total ? Math.max(6, Math.round(j.completed/j.total*100)) : 8;
    $('#prog').style.width=(j.status==='done'?100:pct)+'%';
    $('#progCount').textContent = j.total ? `${j.completed} / ${j.total} checks complete` : '';
    if(j.status==='done'||j.status==='error'){
      clearInterval(pollTimer); $('#run').disabled=false; $('#spin').style.display='none';
      if(j.status==='error'){ showError(j.message, j.traceback); $('#progCard').style.display='none'; }
      else { $('#statusMsg').textContent='✓ Evaluation complete.'; render(j); }
    } else if(j.tests || j.checks){ render(j, true); }
  }, 1800);
}

function showError(msg, tb){
  $('#results').innerHTML = `<div class="card"><div class="err"><b>Error:</b> ${esc(msg)}${tb?'\n\n'+esc(tb):''}</div></div>`;
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function verdictBadge(v){
  if(v==='flagged') return '<span class="badge b-bad">flagged</span>';
  if(v==='correct') return '<span class="badge b-ok">correct</span>';
  if(v==='gaps_found') return '<span class="badge b-warn">gaps found</span>';
  if(v==='complete'||v==='clean'||v==='single_gtfa'||v===true||v==='True') return '<span class="badge b-ok">pass</span>';
  if(v==='not_single_gtfa'||v===false||v==='False') return '<span class="badge b-bad">issue</span>';
  return `<span class="badge b-mut">${esc(v||'—')}</span>`;
}
function actionBadge(a){
  if(a==='delete') return '<span class="badge b-bad">delete</span>';
  if(a==='edit') return '<span class="badge b-warn">edit</span>';
  if(a==='keep') return '<span class="badge b-ok">keep</span>';
  return '';
}

function render(j, partial){
  const rubrics=j.rubrics||[], tests=j.tests||[], checks=j.checks||[];
  const rFlag=rubrics.filter(t=>t.verifier_verdict==='flagged').length;
  const tFlag=tests.filter(t=>t.verifier_verdict==='flagged').length;
  const errored=[...rubrics,...tests].filter(t=>t.error).length;
  let html='<div class="card">';
  html+='<div class="chips">';
  if(rubrics.length){
    html+=`<span class="chip"><b>${rubrics.length}</b> rubrics audited</span>`;
    html+=`<span class="chip ${rFlag?'bad':'ok'}"><b>${rFlag}</b> rubrics flagged</span>`;
  }
  html+=`<span class="chip"><b>${tests.length}</b> tests audited</span>`;
  html+=`<span class="chip ${tFlag?'bad':'ok'}"><b>${tFlag}</b> tests flagged</span>`;
  if(errored) html+=`<span class="chip warn"><b>${errored}</b> errored</span>`;
  const cov=checks.find(c=>c.item_id==='coverage_check');
  if(cov){ const p=payload(cov); const miss=(p.missing_criteria||[]).length;
    html+=`<span class="chip ${miss?'warn':'ok'}"><b>${miss}</b> coverage gaps</span>`; }
  html+='</div>';

  // task-level checks
  html+='<h2 class="sec">Task-level checks</h2>';
  if(!checks.length) html+='<div class="empty">running…</div>';
  checks.forEach((c,i)=>{ html+=renderCheck(c,i); });

  // per-rubric (only if rubrics were submitted)
  if(rubrics.length){
    html+='<h2 class="sec">Per-rubric audits</h2>';
    rubrics.sort(byFlag);
    rubrics.forEach((t,i)=>{ html+=renderItem(t,i); });
  }

  // per-test
  if(tests.length || j.filename){
    html+='<h2 class="sec">Per-test audits</h2>';
    if(!tests.length) html+='<div class="empty">running…</div>';
    tests.sort(byFlag);
    tests.forEach((t,i)=>{ html+=renderItem(t,i); });
  }
  html+='</div>';
  $('#results').innerHTML=html;
  bindToggles();
}
function byFlag(a,b){ return (a.verifier_verdict==='flagged'?-1:1)-(b.verifier_verdict==='flagged'?-1:1); }

function payload(c){ try{ return JSON.parse(c.check_payload||'{}'); }catch(e){ return {}; } }

function renderItem(t,i){
  const open = t.verifier_verdict==='flagged';
  let body='';
  if(t.error){ body=`<div class="err">${esc(t.error)}</div>`; }
  else{
    (t.quality_issues||[]).forEach(q=>{
      body+=`<div class="qi ${q.severity==='minor'?'minor':''}">
        <div class="qh">${esc(q.severity)} · ${esc(q.category)}</div>
        <div>${esc(q.description||q.explanation||'')}</div>
        ${q.evidence?`<div class="hint" style="margin-top:6px">Evidence: ${esc(q.evidence)}</div>`:''}</div>`;
    });
    if(t.resolution_comment){ body+=`<div class="kv"><div class="k">Resolution (${esc(t.resolution_action||'keep')})</div><div>${esc(t.resolution_comment)}</div></div>`; }
    if(t.reasoning){ body+=`<div class="kv"><div class="k">Reasoning</div><pre>${esc(t.reasoning)}</pre></div>`; }
    if(!body) body='<div class="empty">No issues found — verifier looks correct.</div>';
  }
  return `<div class="item ${open?'open':''}">
    <div class="head">
      ${verdictBadge(t.verifier_verdict)} ${actionBadge(t.resolution_action)}
      <span class="name">${esc(t.item_id)}</span>
      <span class="meta">${t.confidence?('conf '+esc(t.confidence)):''} ${t.duration_seconds?('· '+Math.round(t.duration_seconds)+'s'):''}</span>
      <span class="caret">▸</span>
    </div><div class="body">${body}</div></div>`;
}

function renderCheck(c,i){
  const p=payload(c);
  const v=c.verifier_verdict;
  let body='', open=false, title=c.item_id.replace(/_/g,' ');
  if(c.error){ body=`<div class="err">${esc(c.error)}</div>`; }
  else if(c.item_id==='coverage_check'){
    const miss=p.missing_criteria||[];
    open = miss.length>0;
    if(!miss.length) body='<div class="empty">All prompt requirements appear covered by the tests.</div>';
    miss.forEach(m=>{ const crit=(m.criticality||'').includes('crit') && !(m.criticality||'').includes('non');
      body+=`<div class="missing ${crit?'crit':''}"><div class="qh" style="font-size:12px;font-weight:700">${esc(m.criticality||'requirement')}</div>
        <div>${esc(m.description||m.requirement||'')}</div></div>`; });
  } else if(c.item_id==='redundancy_check'){
    const g=p.redundant_groups||[];
    open=g.length>0;
    if(!g.length) body='<div class="empty">No redundant test groups detected.</div>';
    g.forEach(x=>{ body+=`<div class="missing"><div>${esc((x.members||[]).join(', '))}</div>
       <div class="hint" style="margin-top:4px">${esc(x.behavior||'')}</div></div>`; });
  } else if(c.item_id==='single_gtfa_check'){
    const off=p.offenders||[];
    open = v==='not_single_gtfa';
    if(p.failure_mode) body+=`<div class="kv"><div class="k">Failure mode</div><div>${esc(p.failure_mode)}</div></div>`;
    off.forEach(o=>{ body+=`<div class="missing">${esc(typeof o==='string'?o:JSON.stringify(o))}</div>`; });
    if(!body) body='<div class="empty">Tests target a single ground-truth final answer.</div>';
  } else if(c.item_id==='intersection_check'){
    const ov=p.overlaps||[];
    open = ov.length>0;
    if(!ov.length) body='<div class="empty">No problematic rubric/test overlaps.</div>';
    ov.forEach(o=>{ body+=`<div class="missing"><div><b>${esc(o.rubric_id||'')}</b> ↔ <code>${esc(o.test_name||'')}</code></div>
       <div class="hint" style="margin-top:4px">${esc(o.behavior||'')}</div></div>`; });
  } else if(c.item_id==='quoted_rubric_check'){
    const off=p.offenders||[];
    open = (v==='quotes_to_remove') || off.length>0;
    if(!off.length) body='<div class="empty">No over-specific quoted values in rubrics.</div>';
    off.forEach(o=>{ body+=`<div class="missing"><div><b>${esc(o.rubric_id||'')}</b>: “${esc(o.quoted_text||'')}”</div>
       <div class="hint" style="margin-top:4px">${esc(o.reason||'')}</div></div>`; });
  } else {
    body=`<pre>${esc(JSON.stringify(p,null,2))}</pre>`;
  }
  return `<div class="item ${open?'open':''}">
    <div class="head">${verdictBadge(v)}<span class="name" style="text-transform:capitalize">${esc(title)}</span>
      <span class="meta">${c.duration_seconds?Math.round(c.duration_seconds)+'s':''}</span>
      <span class="caret">▸</span></div>
    <div class="body">${body}</div></div>`;
}

function bindToggles(){
  document.querySelectorAll('.item .head').forEach(h=>{
    h.onclick=()=>h.parentElement.classList.toggle('open');
  });
}
</script>
</body>
</html>
